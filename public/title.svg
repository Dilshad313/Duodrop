<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#143255;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2FEBD8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dropGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2FEBD8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#143255;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Small Decorative Element (the diamond/leaf shape) -->
  <g transform="translate(0, 0)">
    <!-- Diamond shape -->
    <polygon points="20,0 40,25 20,50 0,25" fill="url(#dropGradient)" stroke="#2FEBD8" stroke-width="1.5"/>
    <!-- Inner diamond -->
    <polygon points="20,5 35,25 20,45 5,25" fill="none" stroke="#143255" stroke-width="1" opacity="0.3"/>
    <!-- Small dot in center -->
    <circle cx="20" cy="25" r="3" fill="#2FEBD8" opacity="0.8"/>
  </g>
  
  <!-- DUODROP Text -->
  <text x="55" y="42" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="900" fill="url(#logoGradient)" letter-spacing="3">
    DUODROP
  </text>
  
  <!-- Tagline -->
  <text x="55" y="58" font-family="'Arial', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#8A94A6" font-weight="400" letter-spacing="4">
    BUILD NATIVE IN ONE DROP
  </text>
</svg>